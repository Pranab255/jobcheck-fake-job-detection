{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center min-vh-100 align-items-center">
        <div class="col-md-6 col-lg-5" data-aos="fade-up">
            <div class="card-modern">
                <div class="card-header-modern text-center">
                    <i class="fas fa-robot fa-3x mb-3"></i>
                    <h3 class="mb-0">Welcome Back!</h3>
                    <p class="mb-0 opacity-75">Sign in to continue to JobCheck AI</p>
                </div>
                <div class="card-body-modern">
                    <form method="POST" class="form-modern">
                        <div class="mb-4">
                            <label class="form-label-modern">
                                <i class="fas fa-user me-2"></i>Username
                            </label>
                            <input type="text" class="form-control-modern" name="username" required 
                                   placeholder="Enter your username">
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label-modern">
                                <i class="fas fa-lock me-2"></i>Password
                            </label>
                            <input type="password" class="form-control-modern" name="password" required 
                                   placeholder="Enter your password">
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember">
                                <label class="form-check-label" for="remember">
                                    Remember me
                                </label>
                            </div>
                            <a href="#" class="text-decoration-none">Forgot Password?</a>
                        </div>
                        
                        <button type="submit" class="btn btn-primary-modern btn-modern w-100">
                            <i class="fas fa-sign-in-alt me-2"></i>Login to Dashboard
                        </button>
                    </form>
                    
                    <hr class="my-4">
                    
                    <div class="text-center">
                        <p class="mb-0">Don't have an account? 
                            <a href="{{ url_for('register') }}" class="text-primary fw-bold text-decoration-none">
                                Register here <i class="fas fa-arrow-right ms-1"></i>
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
