{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center min-vh-100 align-items-center">
        <div class="col-md-6 col-lg-5" data-aos="fade-up">
            <div class="card-modern">
                <div class="card-header-modern text-center">
                    <i class="fas fa-user-plus fa-3x mb-3"></i>
                    <h3 class="mb-0">Create Account</h3>
                    <p class="mb-0 opacity-75">Join JobCheck AI today</p>
                </div>
                <div class="card-body-modern">
                    <form method="POST" class="form-modern">
                        <div class="mb-4">
                            <label class="form-label-modern">
                                <i class="fas fa-user me-2"></i>Username
                            </label>
                            <input type="text" class="form-control-modern" name="username" required minlength="3"
                                   placeholder="Choose a username">
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label-modern">
                                <i class="fas fa-envelope me-2"></i>Email Address
                            </label>
                            <input type="email" class="form-control-modern" name="email" required
                                   placeholder="Enter your email">
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label-modern">
                                <i class="fas fa-lock me-2"></i>Password
                            </label>
                            <input type="password" class="form-control-modern" name="password" required minlength="6"
                                   placeholder="Create a password">
                            <small class="text-muted">Must be at least 6 characters</small>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label-modern">
                                <i class="fas fa-lock me-2"></i>Confirm Password
                            </label>
                            <input type="password" class="form-control-modern" name="confirm_password" required minlength="6"
                                   placeholder="Confirm your password">
                        </div>
                        
                        <div class="mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="terms" required>
                                <label class="form-check-label" for="terms">
                                    I agree to the <a href="#" class="text-decoration-none">Terms of Service</a> and 
                                    <a href="#" class="text-decoration-none">Privacy Policy</a>
                                </label>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-success-modern btn-modern w-100">
                            <i class="fas fa-user-plus me-2"></i>Create Account
                        </button>
                    </form>
                    
                    <hr class="my-4">
                    
                    <div class="text-center">
                        <p class="mb-0">Already have an account? 
                            <a href="{{ url_for('login') }}" class="text-primary fw-bold text-decoration-none">
                                Login here <i class="fas fa-arrow-right ms-1"></i>
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
